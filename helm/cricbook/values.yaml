
# Kubernetes namespace to deploy everything into
namespace: cricbook

# Credentials for pulling private images from registries like AWS ECR
imagePullSecrets: []

# ─── Global image pull policy ────────────────────────────────────────────────
image:
  pullPolicy: Always

# ─── PostgreSQL (in-cluster) ──────────────────────────────────────────────────
db:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  password: x5iYaZErmHBgJwFV09cN
  name: postgres
  storage: 1Gi
  storageClassName: "gp3"
  externalEndpoint: ""

# ─── Ollama (local LLM for chat-service) ─────────────────────────────────────
ollama:
  image: ollama/ollama:latest
  storage: 4Gi
  storageClassName: "gp3"
  model: llama3.2:1b

envoy:
  image: envoyproxy/envoy:v1.29-latest
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Microservices ───────────────────────────────────────────────────────────
microservices:
  - name: auth-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/auth-service:latest
    port: 4001
    replicas: 1
    extraEnv: []

  - name: turf-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/turf-service:latest
    port: 4002
    replicas: 1
    extraEnv: []

  - name: coach-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/coach-service:latest
    port: 4003
    replicas: 1
    extraEnv: []

  - name: match-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/match-service:latest
    port: 4004
    replicas: 1
    extraEnv: []

  - name: shop-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/shop-service:latest
    port: 4005
    replicas: 1
    extraEnv: []

  - name: chat-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/chat-service:latest
    port: 4006
    replicas: 1
    extraEnv:
      - name: OLLAMA_HOST
        valueFrom:
          configMapKeyRef:
            name: cricbook-config
            key: OLLAMA_HOST

  - name: admin-service
    image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/admin-service:latest
    port: 4007
    replicas: 1
    extraEnv: []

# ─── Frontend (Next.js) ───────────────────────────────────────────────────────
frontend:
  image: 409823419470.dkr.ecr.ap-south-2.amazonaws.com/cricbook/frontend:latest
  port: 3000
  replicas: 1

gateway:
  enabled: true
  className: cricbook-envoy
  port: 80

jwt:
  enabled: false
  issuer: "http://auth-service.cricbook.svc.cluster.local:4001"
  jwksUri: "http://auth-service.cricbook.svc.cluster.local:4001/.well-known/jwks.json"

rateLimit:
  enabled: true
  auth:
    requestsPerUnit: 20
    unit: Minute
  api:
    requestsPerUnit: 100
    unit: Minute
  frontend:
    requestsPerUnit: 500
    unit: Minute

secrets:
  jwtSecret: "rKrwfPx7U3hkmdN8edjfg/SpX26CNi49g1e/vQCfj4KZQNm+deBTq58ZYebW3R70"
  internalApiKey: "4CDhO+Ldp/HIy2TIQ+Mur0liRV6EIRBH83C83cN1zQ4="
