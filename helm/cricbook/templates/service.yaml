# service.yaml — Kubernetes Services for CricBook

# Infrastructure services
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
    app: db
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: db

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
    app: ollama
spec:
  type: ClusterIP
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
    name: ollama-api
  selector:
    app: ollama

---
# Microservice Services
{{- range .Values.microservices }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "cricbook.labels" $ | nindent 4 }}
    app: {{ .name }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .port }}
    {{- if $.Values.envoy.enabled }}
    targetPort: 15001      # → Envoy sidecar, which proxies to app :{{ .port }}
    {{- else }}
    targetPort: {{ .port }} # → app container directly (sidecar disabled)
    {{- end }}
    protocol: TCP
    name: http
  selector:
    app: {{ .name }}
{{- end }}

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
    app: frontend
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.frontend.port }}
    {{- if .Values.envoy.enabled }}
    targetPort: 15001
    {{- else }}
    targetPort: {{ .Values.frontend.port }}
    {{- end }}
    protocol: TCP
    name: http
  selector:
    app: frontend
