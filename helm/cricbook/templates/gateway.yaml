---
# ── /  catch-all → frontend  (PUBLIC — no JWT) ────────────────────────────
# Must be last / least-specific. Gateway API routes by longest-prefix-match,
# so all /api/* routes above will win over this catch-all.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: {{ .Values.frontend.port }}

---
# =============================================================================
# SecurityPolicy  —  JWT Authentication
#
# WHAT IS IT?
#   A SecurityPolicy is an Envoy Gateway custom resource. It attaches to one
#   or more HTTPRoutes and tells Envoy to validate JWT tokens BEFORE forwarding
#   the request to your service.
#
# HOW JWT AUTH WORKS HERE:
#   1. Client logs in via POST /api/auth/login  →  auth-service returns a JWT.
#   2. Client includes the JWT in subsequent requests:
#        Authorization: Bearer <token>
#   3. Envoy Gateway intercepts the request, fetches the public key from
#      auth-service's JWKS endpoint, and verifies the token signature.
#   4a. Valid token  →  request forwarded; two headers are injected:
#          X-User-Id:   value of "sub" claim (user ID)
#          X-User-Role: value of "role" claim (admin / user / coach etc.)
#   4b. Invalid / missing token  →  Envoy returns 401 Unauthorized immediately.
#       Your backend services never even see the bad request.
#
# ROUTES PROTECTED: turf, coach, match, shop, chat, admin
# ROUTES EXCLUDED:  auth (login/register), frontend (HTML pages)
#
# PREREQUISITE: auth-service must expose GET /.well-known/jwks.json
# =============================================================================
{{- if .Values.jwt.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: jwt-auth-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  # Apply this policy to all protected API routes
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-turf
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-coach
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-match
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-shop
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-chat
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-admin
  jwt:
    providers:
    - name: cricbook-auth
      # Who issued the JWT (must match "iss" claim in the token)
      issuer: {{ .Values.jwt.issuer | quote }}
      # Where to get the public keys to verify JWT signatures
      remoteJWKS:
        uri: {{ .Values.jwt.jwksUri | quote }}
      # Forward JWT claims as HTTP headers so backend services don't need
      # to parse the token themselves
      claimToHeaders:
      - claim: sub    # user ID
        header: X-User-Id
      - claim: role   # user role (admin / user / coach)
        header: X-User-Role
      - claim: email
        header: X-User-Email
{{- end }}

---
# =============================================================================
# BackendTrafficPolicy  —  Rate Limiting
#
# WHAT IS IT?
#   A BackendTrafficPolicy is another Envoy Gateway custom resource.
#   It controls how much traffic is allowed to reach each route.
#
# HOW LOCAL RATE LIMITING WORKS:
#   "Local" means each Envoy pod tracks its own counter — no external server
#   needed. When a client sends too many requests:
#     → Envoy returns 429 Too Many Requests
#     → The backend service is never hit
#     → The counter resets every minute (configurable)
#
# LIMITS SET:
#   /api/auth   → {{ .Values.rateLimit.auth.requestsPerUnit }} req/{{ .Values.rateLimit.auth.unit }}
#     Reason: Brute-force protection. Attackers trying thousands of
#             password guesses will hit the wall quickly.
#
#   /api/turf, /api/coach, /api/match, /api/shop, /api/chat, /api/admin
#             → {{ .Values.rateLimit.api.requestsPerUnit }} req/{{ .Values.rateLimit.api.unit }} each
#     Reason: Reasonable API limit for normal users. Adjust in values.yaml.
#
#   /           → {{ .Values.rateLimit.frontend.requestsPerUnit }} req/{{ .Values.rateLimit.frontend.unit }}
#     Reason: Higher limit for page loads and static assets.
# =============================================================================
{{- if .Values.rateLimit.enabled }}

# Auth route — tight limit (brute-force protection)
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-auth
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ .Values.rateLimit.auth.requestsPerUnit }}
          unit: {{ .Values.rateLimit.auth.unit }}

# Protected API routes — standard API limit
{{- $ns := .Values.namespace }}
{{- $rl := .Values.rateLimit }}
{{- range list "route-turf" "route-coach" "route-match" "route-shop" "route-chat" "route-admin" }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-{{ . }}
  namespace: {{ $ns }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ . }}
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ $rl.api.requestsPerUnit }}
          unit: {{ $rl.api.unit }}
{{- end }}

# Frontend — higher limit for browser page loads
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-frontend
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ .Values.rateLimit.frontend.requestsPerUnit }}
          unit: {{ .Values.rateLimit.frontend.unit }}

{{- end }}{{/* rateLimit.enabled */}}
{{- end }}{{/* gateway.enabled */}}
