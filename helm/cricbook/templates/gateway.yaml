---
# ── /  catch-all → frontend  (PUBLIC — no JWT) ────────────────────────────
# Must be last / least-specific. Gateway API routes by longest-prefix-match,
# so all /api/* routes above will win over this catch-all.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: {{ .Values.frontend.port }}

---
{{- if .Values.jwt.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: jwt-auth-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  # Apply this policy to all protected API routes
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-turf
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-coach
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-match
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-shop
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-chat
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-admin
  jwt:
    providers:
    - name: cricbook-auth
      # Who issued the JWT (must match "iss" claim in the token)
      issuer: {{ .Values.jwt.issuer | quote }}
      # Where to get the public keys to verify JWT signatures
      remoteJWKS:
        uri: {{ .Values.jwt.jwksUri | quote }}
      # Forward JWT claims as HTTP headers so backend services don't need
      # to parse the token themselves
      claimToHeaders:
      - claim: sub    # user ID
        header: X-User-Id
      - claim: role   # user role (admin / user / coach)
        header: X-User-Role
      - claim: email
        header: X-User-Email
{{- end }}

---
{{- if .Values.rateLimit.enabled }}

# Auth route — tight limit (brute-force protection)
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-auth
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ .Values.rateLimit.auth.requestsPerUnit }}
          unit: {{ .Values.rateLimit.auth.unit }}

# Protected API routes — standard API limit
{{- $ns := .Values.namespace }}
{{- $rl := .Values.rateLimit }}
{{- range list "route-turf" "route-coach" "route-match" "route-shop" "route-chat" "route-admin" }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-{{ . }}
  namespace: {{ $ns }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ . }}
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ $rl.api.requestsPerUnit }}
          unit: {{ $rl.api.unit }}
{{- end }}

# Frontend — higher limit for browser page loads
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: rate-limit-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: route-frontend
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: {{ .Values.rateLimit.frontend.requestsPerUnit }}
          unit: {{ .Values.rateLimit.frontend.unit }}

{{- end }}{{/* rateLimit.enabled */}}
{{- end }}{{/* gateway.enabled */}}
