{{- if .Values.gateway.enabled }}
# gateway.yaml — Kubernetes Gateway API resources for CricBook

# GatewayClass
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  description: "CricBook gateway — powered by Envoy Proxy"

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cricbook-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
  - name: http
    port: {{ .Values.gateway.port }}
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same   # only HTTPRoutes in the cricbook namespace are accepted

---
# ── /api/auth  (PUBLIC — no JWT required, this is where you GET the JWT) ──
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /    # strips "/api/auth", auth-service sees "/"
    backendRefs:
    - name: auth-service
      port: 4001

---
# ── /api/turf  (PROTECTED — JWT required) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-turf
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/turf
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: turf-service
      port: 4002

