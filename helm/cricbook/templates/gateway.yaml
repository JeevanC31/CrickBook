{{- if .Values.gateway.enabled }}
# =============================================================================
# gateway.yaml  —  Kubernetes Gateway API resources for CricBook
#
# WHAT IS THE KUBERNETES GATEWAY API?
#   It's the modern, standard way to expose services in Kubernetes.
#   Think of it like a smart traffic cop sitting in front of all your services.
#   Instead of one LoadBalancer per service (expensive), you get ONE gateway
#   that routes traffic to the right service based on the URL path.
#
# WHAT IS ENVOY GATEWAY?
#   Envoy Gateway is the software that RUNS the gateway. It uses Envoy Proxy
#   (the same proxy used by Istio, Lyft, etc.) as its data plane. When you
#   install Envoy Gateway in your cluster, it watches for GatewayClass/Gateway/
#   HTTPRoute resources and automatically configures Envoy pods to handle them.
#
# RESOURCE HIERARCHY:
#   GatewayClass  →  "use Envoy Gateway as the gateway engine"
#       │
#   Gateway       →  "listen on port 80, allow routes from this namespace"
#       │
#   HTTPRoute     →  "requests to /api/auth/* go to auth-service:4001"
#       │
#   SecurityPolicy →  "require valid JWT on /api/turf, /api/coach, etc."
#       │
#   BackendTrafficPolicy → "allow max N requests per minute per route"
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# GatewayClass
# Tells Kubernetes: "When a Gateway says className: cricbook-envoy, use the
# Envoy Gateway controller to manage it."
# Envoy Gateway registers itself with the controller name below when installed.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  description: "CricBook gateway — powered by Envoy Proxy"

---
# ─────────────────────────────────────────────────────────────────────────────
# Gateway
# The actual entry point. Creates a LoadBalancer Service (managed by Envoy
# Gateway) that gets a public IP. All CricBook traffic enters here on port 80.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cricbook-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
  - name: http
    port: {{ .Values.gateway.port }}
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same   # only HTTPRoutes in the cricbook namespace are accepted

---
# =============================================================================
# HTTPRoutes  —  Path-based routing rules
#
# Each HTTPRoute says: "requests matching this path prefix go to this service".
# More-specific paths win over less-specific ones (Gateway API spec guarantee).
#
# URL rewriting: each route strips its path prefix before forwarding.
# Example: GET /api/auth/login  →  auth-service receives GET /login
# This lets each microservice keep routes starting at "/" without knowing
# about the /api/<name> prefix the gateway adds.
# =============================================================================

# ── /api/auth  (PUBLIC — no JWT required, this is where you GET the JWT) ──
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /    # strips "/api/auth", auth-service sees "/"
    backendRefs:
    - name: auth-service
      port: 4001

---
# ── /api/turf  (PROTECTED — JWT required) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-turf
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/turf
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: turf-service
      port: 4002

---
# ── /api/coach  (PROTECTED — JWT required) ────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-coach
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/coach
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: coach-service
      port: 4003

---
# ── /api/match  (PROTECTED — JWT required) ────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-match
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/match
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: match-service
      port: 4004

---
# ── /api/shop  (PROTECTED — JWT required) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-shop
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/shop
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: shop-service
      port: 4005

---
# ── /api/chat  (PROTECTED — JWT required) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-chat
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/chat
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: chat-service
      port: 4006

---
# ── /api/admin  (PROTECTED — JWT required) ────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: cricbook-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
