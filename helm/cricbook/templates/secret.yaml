# ─────────────────────────────────────────────────────────────────────────────
# Secret 1: cricbook-db-secret
#   Stores the PostgreSQL credentials and the pre-built DATABASE_URL.
#   Kubernetes Secrets are base64-encoded by default; Helm's b64enc filter
#   handles that automatically so you only set plain-text values in values.yaml.
#
#   Consumed by: all microservice Deployments (DATABASE_URL env var).
#   Consumed by: the db Deployment (POSTGRES_USER / PASSWORD / DB env vars).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cricbook-db-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER:     {{ .Values.db.user     | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.password | b64enc | quote }}
  POSTGRES_DB:       {{ .Values.db.name     | b64enc | quote }}
  # Pre-built connection string — services read this single env var
  DATABASE_URL: {{ printf "postgresql://%s:%s@db:5432/%s" .Values.db.user .Values.db.password .Values.db.name | b64enc | quote }}

---
# ─────────────────────────────────────────────────────────────────────────────
# Secret 2: cricbook-app-secret
#   Application-level secrets (JWT signing key, internal API key).
#   Services read these via secretKeyRef in their Deployment env section.
#
#   IMPORTANT: Override before production:
#     helm upgrade cricbook ./helm/cricbook \
#       --set secrets.jwtSecret=<real-64-char-secret> \
#       --set secrets.internalApiKey=<real-key>
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cricbook-app-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET:       {{ .Values.secrets.jwtSecret      | b64enc | quote }}
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | b64enc | quote }}
