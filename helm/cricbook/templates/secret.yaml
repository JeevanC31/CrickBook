# Secret 1: cricbook-db-secret
apiVersion: v1
kind: Secret
metadata:
  name: cricbook-db-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER:     {{ .Values.db.user     | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.password | b64enc | quote }}
  POSTGRES_DB:       {{ .Values.db.name     | b64enc | quote }}
  # Pre-built connection string — services read this single env var
  {{- $dbHost := "db:5432" }}
  {{- if .Values.db.externalEndpoint }}
  {{- $dbHost = .Values.db.externalEndpoint }}
  {{- end }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s/%s" .Values.db.user .Values.db.password $dbHost .Values.db.name | b64enc | quote }}

---
# Secret 2: cricbook-app-secret
apiVersion: v1
kind: Secret
metadata:
  name: cricbook-app-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET:       {{ .Values.secrets.jwtSecret      | b64enc | quote }}
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | b64enc | quote }}
