# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaim: pgdata-pvc
#   Stores PostgreSQL data so the database survives pod restarts.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.storage }}

---
# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaim: ollama-data-pvc
#   Stores downloaded Ollama model weights (~4 Gi for llama3.2:1b).
#   Without this PVC the model is re-downloaded every time the pod restarts.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cricbook.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
