apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cricbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JeevanC31/CrickBook.git
    targetRevision: HEAD
    path: helm/cricbook
  destination:
    server: https://kubernetes.default.svc
    namespace: cricbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
