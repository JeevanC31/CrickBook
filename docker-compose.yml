services:
  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cricbook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cricbook-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service — Port 4001 ──────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: cricbook-auth
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cricbook-net

  # ─── Turf Service — Port 4002 ─────────────────────────────────────────────
  turf-service:
    build: ./services/turf-service
    container_name: cricbook-turf
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4002
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cricbook-net

  # ─── Coach Service — Port 4003 ────────────────────────────────────────────
  coach-service:
    build: ./services/coach-service
    container_name: cricbook-coach
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4003
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cricbook-net

  # ─── Match Service — Port 4004 ────────────────────────────────────────────
  match-service:
    build: ./services/match-service
    container_name: cricbook-match
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4004
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cricbook-net

  # ─── Shop Service — Port 4005 ─────────────────────────────────────────────
  shop-service:
    build: ./services/shop-service
    container_name: cricbook-shop
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4005
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cricbook-net

  # ─── Chat Service — Port 4006 ─────────────────────────────────────────────
  chat-service:
    build: ./services/chat-service
    container_name: cricbook-chat
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4006
      OLLAMA_HOST: "http://ollama:11434"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - cricbook-net

  # ─── Admin Service — Port 4007 ────────────────────────────────────────────
  admin-service:
    build: ./services/admin-service
    container_name: cricbook-admin
    restart: unless-stopped
    ports:
      - "4007:4007"
    environment:
      DATABASE_URL: "postgresql://postgres:admin123@db:5432/postgres"
      PORT: 4007
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - admin-uploads:/app/public/uploads
    networks:
      - cricbook-net

  # ─── Ollama Service — Port 11434 ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cricbook-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cricbook-net

  # ─── Ollama Model Preloader ───────────────────────────────────────────────
  ollama-pull:
    image: curlimages/curl:latest
    container_name: cricbook-ollama-pull
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Waiting for Ollama service to start..."
        while ! curl -s http://ollama:11434/api/tags >/dev/null; do sleep 2; done
        echo "Pulling llama3.2:1b model..."
        curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2:1b"}'
        echo "Llama3.2:1b successfully loaded!"
    networks:
      - cricbook-net

  # ─── Frontend — Port 3000 ─────────────────────────────────────────────────
  frontend:

    build:
      context: ./cricbook-next
      args:
        # NEXT_PUBLIC_* vars are baked into the JS at build time.
        # Browsers run on the HOST machine, so they must use localhost.
        NEXT_PUBLIC_AUTH_URL: "http://localhost:4001"
        NEXT_PUBLIC_TURF_URL: "http://localhost:4002"
        NEXT_PUBLIC_COACH_URL: "http://localhost:4003"
        NEXT_PUBLIC_MATCH_URL: "http://localhost:4004"
        NEXT_PUBLIC_SHOP_URL: "http://localhost:4005"
        NEXT_PUBLIC_CHAT_URL: "http://localhost:4006"
        NEXT_PUBLIC_ADMIN_URL: "http://localhost:4007"
    container_name: cricbook-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      AUTH_API_URL: "http://auth-service:4001"
      TURF_API_URL: "http://turf-service:4002"
      COACH_API_URL: "http://coach-service:4003"
      MATCH_API_URL: "http://match-service:4004"
      SHOP_API_URL: "http://shop-service:4005"
    depends_on:
      - auth-service
      - turf-service
      - coach-service
      - match-service
      - shop-service
      - chat-service
      - admin-service
    networks:
      - cricbook-net

volumes:
  pgdata:
  admin-uploads:
  ollama-data:

networks:
  cricbook-net:
    driver: bridge
